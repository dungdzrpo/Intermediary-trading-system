<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nạp tiền vào ví</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center text-primary mb-4">Nạp Tiền VNPay</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/wallet/deposit}" method="post">
        <div class="mb-3">
            <label class="form-label">Nhập số tiền cần nạp (VNĐ)</label>
            <input type="number" name="amount" class="form-control" min="10000" step="1000" placeholder="VD: 50000" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Xác Nhận Nạp Tiền</button>
        <a href="/" class="btn btn-secondary w-100 mt-2">Quay lại trang chủ</a>
    </form>
</div>

</body>
</html>
