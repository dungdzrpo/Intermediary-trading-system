<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Bán Sản Phẩm Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Quay lại Trang Chủ</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9"> <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Đăng Bán Sản Phẩm (Phí: 5.000 VNĐ)</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/posts/create}" th:object="${postDTO}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề bài viết <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{title}" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-success">Mô tả công khai (Có thể chèn hình ảnh) <span class="text-danger">*</span></label>
                        <textarea th:field="*{description}" id="summernote" required></textarea>
                    </div>

                    <div class="mb-3 alert alert-warning">
                        <label class="form-label fw-bold">Thông tin Ẩn (Bảo mật) <span class="text-danger">*</span></label>
                        <textarea th:field="*{hiddenInfo}" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{price}" class="form-control" required min="10000" step="1000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Ai chịu phí sàn (5%)?</label>
                            <select th:field="*{feePayer}" class="form-select">
                                <option value="SELLER">Người bán chịu</option>
                                <option value="BUYER">Người mua chịu</option>
                            </select>
                        </div>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-success btn-lg w-100">Xác Nhận Đăng Bài (-5.000đ)</button>
                </form>
            </div>
        </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {

        // Lấy thông tin CSRF token từ meta tag (Bắt buộc phải có để Spring Security cho phép POST)
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");
        $(document).ajaxSend(function(e, xhr, options) {
            xhr.setRequestHeader(header, token);
        });

        $('#summernote').summernote({
            placeholder: 'Viết mô tả chi tiết sản phẩm, bạn có thể kéo thả hoặc chèn hình ảnh vào đây...',
            tabsize: 2,
            height: 300, // Chiều cao ô soạn thảo
            lang: 'vi-VN', // Ngôn ngữ tiếng Việt (nếu đã nhúng file lang)
            toolbar: [
                // Cấu hình thanh công cụ tối giản
                ['style', ['style']],
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture', 'video']], // Nút chèn ảnh nằm ở đây
                ['view', ['fullscreen', 'codeview', 'help']]
            ],
            // Xử lý sự kiện khi người dùng chèn ảnh
            callbacks: {
                onImageUpload: function(files) {
                    // Gọi hàm upload ảnh qua Ajax
                    uploadImage(files[0]);
                }
            }
        });

        // Hàm Ajax gửi ảnh sang Backend
        function uploadImage(file) {
            var data = new FormData();
            data.append("image", file); // Tên tham số "image" phải khớp với @RequestParam trong Controller

            $.ajax({
                url: "/api/upload-image", // URL của API Backend
                cache: false,
                contentType: false,
                processData: false,
                data: data,
                type: "POST",
                success: function(url) {
                    // Nếu Backend lưu thành công và trả về URL, chèn ảnh vào ô soạn thảo
                    $('#summernote').summernote('insertImage', url);
                    console.log("Upload ảnh thành công: " + url);
                },
                error: function(data) {
                    console.error("Lỗi upload ảnh:");
                    console.log(data);
                    alert("Không thể upload hình ảnh. Lỗi: " + data.responseText);
                }
            });
        }
    });
</script>

</body>
</html>
