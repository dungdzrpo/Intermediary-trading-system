<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sach khieu nai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('disputes')}"></div>

    <div class="flex-grow-1 p-4">
        <h3 class="mb-4">Danh sach Khieu nai</h3>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="card shadow-sm border-0 mb-4" th:if="${!isAdmin}">
            <div class="card-body">
                <h5 class="mb-3">Tao khieu nai (Buyer)</h5>
                <form th:action="@{/disputes/create}" method="post" class="row g-2">
                    <div class="col-md-3">
                        <input name="orderId" type="number" class="form-control" placeholder="Nhap ma Order" required>
                    </div>
                    <div class="col-md-7">
                        <input name="reason" type="text" class="form-control" placeholder="Ly do khieu nai" required>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Tao</button>
                    </div>
                </form>
            </div>
        </div>`r`n<div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-striped mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Order</th>
                        <th>Buyer</th>
                        <th>Seller</th>
                        <th>Status</th>
                        <th>Tao luc</th>
                        <th class="text-end pe-3">Chi tiet</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(disputes)}">
                        <td colspan="7" class="text-center py-4 text-muted">Chua co khieu nai nao</td>
                    </tr>
                    <tr th:each="d : ${disputes}">
                        <td class="ps-3" th:text="${d.id}"></td>
                        <td th:text="${d.order.id}"></td>
                        <td th:text="${d.buyer.username}"></td>
                        <td th:text="${d.seller.username}"></td>
                        <td>
                            <span class="badge bg-secondary" th:text="${d.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-end pe-3">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/disputes/' + ${d.id}}">Mo</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
