<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Khiếu Nại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('disputes')}"></div>

    <div class="flex-grow-1 p-5">
        <h3 class="mb-4 border-start border-danger border-5 ps-2">Danh Sách Khiếu Nại & Phán Xử</h3>

        <div th:if="${successMessage}" class="alert alert-success shadow-sm" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger shadow-sm" th:text="${errorMessage}"></div>

        <div class="card shadow-sm border-0 mb-4" th:if="${!isAdmin}">
            <div class="card-body p-4">
                <h5 class="mb-3 text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i>Tạo khiếu nại (Dành cho Người mua)</h5>
                <form th:action="@{/disputes/create}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Mã Đơn Hàng</label>
                        <input name="orderId" type="number" class="form-control" placeholder="Ví dụ: 12" required>
                    </div>
                    <div class="col-md-7">
                        <label class="form-label text-muted small fw-bold">Lý do khiếu nại</label>
                        <input name="reason" type="text" class="form-control" placeholder="Ví dụ: Sai mật khẩu, hàng lỗi..." required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-danger w-100 fw-bold" type="submit">Gửi Khiếu Nại</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle text-center">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-start">Mã KN</th>
                        <th class="py-3">Mã Đơn</th>
                        <th class="py-3">Người Mua</th>
                        <th class="py-3">Người Bán</th>
                        <th class="py-3">Trạng Thái</th>
                        <th class="py-3">Ngày Tạo</th>
                        <th class="text-end pe-4 py-3">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody class="border-top-0">
                    <tr th:if="${#lists.isEmpty(disputes)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-shield-check fs-1 d-block mb-2 text-success"></i>
                            Tuyệt vời! Hiện chưa có khiếu nại nào.
                        </td>
                    </tr>
                    <tr th:each="d : ${disputes}">
                        <td class="ps-4 text-start fw-bold text-secondary" th:text="'#' + ${d.id}"></td>
                        <td class="fw-bold" th:text="'#' + ${d.order.id}"></td>
                        <td th:text="${d.buyer.username}"></td>
                        <td th:text="${d.seller.username}"></td>
                        <td>
                            <span class="badge bg-warning text-dark px-2 py-1" th:if="${d.status.name() == 'OPEN'}">MỚI TẠO</span>
                            <span class="badge bg-info text-dark px-2 py-1" th:if="${d.status.name() == 'SELLER_CONFIRMED'}">NGƯỜI BÁN ĐÃ XÁC NHẬN</span>
                            <span class="badge bg-danger px-2 py-1" th:if="${d.status.name() == 'ESCALATED_TO_ADMIN'}">GỌI ADMIN (ĐÃ CỌC)</span>
                            <span class="badge bg-success px-2 py-1" th:if="${d.status.name() == 'RESOLVED_FOR_BUYER'}">HOÀN TIỀN NGƯỜI MUA</span>
                            <span class="badge bg-success px-2 py-1" th:if="${d.status.name() == 'RESOLVED_FOR_SELLER'}">GIẢI NGÂN NGƯỜI BÁN</span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-end pe-4">
                            <a class="btn btn-sm btn-outline-primary fw-bold" th:href="@{'/disputes/' + ${d.id}}">Chi Tiết</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
