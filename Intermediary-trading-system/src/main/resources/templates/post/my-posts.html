<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Bài Đã Đăng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">

  <div th:replace="~{fragments/sidebar :: sidebar('my-posts')}"></div>

  <div class="flex-grow-1 p-5">
    <div class="container-fluid">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="border-start border-primary border-5 ps-2 mb-0">Quản Lý Bài Đã Đăng</h3>
        <a href="/posts/create" class="btn btn-primary shadow-sm fw-bold">
          <i class="bi bi-plus-lg me-1"></i> Đăng Bài Mới
        </a>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">

          <div th:if="${#lists.isEmpty(posts)}" class="alert alert-info text-center m-4">
            <i class="bi bi-box-seam fs-1 d-block mb-2 text-secondary"></i>
            Bạn chưa đăng bán sản phẩm nào!
          </div>

          <div class="table-responsive" th:unless="${#lists.isEmpty(posts)}">
            <table class="table table-hover align-middle text-center mb-0">
              <thead class="table-light">
              <tr>
                <th class="py-3 ps-4 text-start">Sản Phẩm</th>
                <th class="py-3">Giá Bán</th>
                <th class="py-3 bg-success-subtle text-success border-success border-bottom-0">Thực Nhận</th>
                <th class="py-3">Hiển Thị</th>
                <th class="py-3">Trạng Thái</th>
                <th class="py-3">Ngày Đăng</th>
                <th class="py-3 pe-4 text-end">Thao Tác</th>
              </tr>
              </thead>
              <tbody class="border-top-0">
              <tr th:each="post : ${posts}">
                <td class="ps-4 text-start">
                  <div class="fw-bold text-primary text-truncate" style="max-width: 200px;" th:text="${post.title}">Tên SP</div>
                  <div class="small text-muted mt-1">
                    Phí sàn (5%): <span class="fw-bold" th:classappend="${post.feePayer.name() == 'SELLER' ? 'text-danger' : 'text-success'}" th:text="${post.feePayer.name() == 'SELLER' ? 'Bạn chịu' : 'Người mua chịu'}"></span>
                  </div>
                </td>

                <td class="fw-bold text-dark"
                    th:text="${#numbers.formatDecimal(post.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                  100,000 đ
                </td>

                <td class="bg-light border-start border-end border-success-subtle">
                  <div class="fw-bold text-success fs-6"
                       th:if="${post.feePayer.name() == 'SELLER'}"
                       th:text="${#numbers.formatDecimal(post.price * 0.95, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    95,000 đ
                  </div>
                  <div class="fw-bold text-success fs-6"
                       th:if="${post.feePayer.name() == 'BUYER'}"
                       th:text="${#numbers.formatDecimal(post.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    100,000 đ
                  </div>
                </td>

                <td>
                  <span class="badge bg-info text-dark" th:if="${post.visibility?.name() == 'PUBLIC'}">
                      <i class="bi bi-globe me-1"></i> Công Khai
                  </span>
                  <span class="badge bg-secondary" th:if="${post.visibility?.name() == 'UNLISTED'}">
                      <i class="bi bi-link-45deg me-1"></i> Ẩn Danh
                  </span>
                </td>

                <td>
                  <span class="badge bg-success px-3 py-2" th:if="${post.status.name() == 'ACTIVE'}">ĐANG BÁN</span>
                  <span class="badge bg-dark px-3 py-2" th:if="${post.status.name() == 'SOLD'}">ĐÃ BÁN</span>
                  <span class="badge bg-danger px-3 py-2" th:if="${post.status.name() == 'HIDDEN'}">BỊ ẨN</span>
                </td>

                <td class="text-muted small" th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy')}">
                  01/01/2026
                </td>

                <td class="pe-4 text-end">
                  <a th:href="@{'/posts/my-post-detail/' + ${post.id}}" class="btn btn-sm btn-outline-primary fw-bold" title="Xem chi tiết">
                    <i class="bi bi-eye"></i> Xem
                  </a>
                </td>
              </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
