<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chợ Giao Dịch </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Hiệu ứng nổi lên khi hover vào từng dòng sản phẩm */
        .post-row {
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        .post-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
            border-left: 4px solid #0d6efd; /* Vạch xanh bên trái */
        }
    </style>
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar('home')}"></div>

    <div class="flex-grow-1 p-5">



        <h3 class="mb-4 border-start border-primary border-5 ps-2">Khu Vực Chợ Giao Dịch</h3>

        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body p-3">
                <form th:action="@{/}" method="get" class="row g-2 align-items-center">

                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="keyword" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm tên sản phẩm..." th:value="${keyword}">
                        </div>
                    </div>

                    <div class="col-md-3">
                        <select name="sort" class="form-select" onchange="this.form.submit()">
                            <option value="newest" th:selected="${sort == 'newest'}">Mới đăng gần đây</option>
                            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá: Thấp đến Cao</option>
                            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá: Cao xuống Thấp</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select name="size" class="form-select" onchange="this.form.submit()">
                            <option value="5" th:selected="${size == 5}">Hiện 5 dòng</option>
                            <option value="10" th:selected="${size == 10}">Hiện 10 dòng</option>
                            <option value="15" th:selected="${size == 15}">Hiện 15 dòng</option>
                            <option value="20" th:selected="${size == 20}">Hiện 20 dòng</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Tìm kiếm</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary" title="Xóa bộ lọc"><i class="bi bi-arrow-clockwise"></i></a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div th:if="${posts.isEmpty()}" class="alert alert-secondary text-center py-5 shadow-sm border-0">
            <i class="bi bi-basket3 fs-1 text-muted mb-3 d-block"></i>
            <h5>Không tìm thấy sản phẩm nào!</h5>
            <p class="mb-0">Hãy thử thay đổi từ khóa tìm kiếm hoặc trở thành người đầu tiên đăng bán.</p>
        </div>

        <div class="d-flex flex-column gap-3">
            <div class="card shadow-sm border-0 post-row" th:each="post : ${posts.content}">
                <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center">

                    <div class="mb-3 mb-md-0 w-100 pe-md-4">
                        <h5 class="card-title text-primary fw-bold mb-2">
                            <a th:href="@{'/posts/' + ${post.id}}" class="text-decoration-none" th:text="${post.title}">Tên sản phẩm</a>
                        </h5>
                        <div class="d-flex flex-wrap gap-4 text-muted small mt-2">
                            <span title="Người bán"><i class="bi bi-person-circle text-secondary"></i> <strong class="text-dark" th:text="${post.seller.username}">user123</strong></span>
                            <span title="Ai chịu 5% phí giao dịch">
                                <i class="bi bi-shield-check text-secondary"></i> Phí sàn:
                                <span class="badge rounded-pill"
                                      th:classappend="${post.feePayer.name() == 'SELLER' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}"
                                      th:text="${post.feePayer.name() == 'SELLER' ? 'Người bán chịu' : 'Người mua chịu'}">
                                </span>
                            </span>
                            <span title="Mã tin"><i class="bi bi-hash text-secondary"></i> Mã: <span th:text="${post.id}">12</span></span>
                        </div>
                    </div>

                    <div class="text-md-end text-start border-start-md ps-md-4" style="min-width: 220px;">
                        <div class="text-muted small mb-1">Giá bán công khai</div>
                        <h4 class="text-danger fw-bold mb-3" th:text="${#numbers.formatDecimal(post.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">100,000 đ</h4>

                        <a th:if="${currentUser != null and currentUser.username == post.seller.username}"
                           th:href="@{'/posts/' + ${post.id}}"
                           class="btn btn-outline-primary w-100 fw-bold shadow-sm">
                            <i class="bi bi-eye me-1"></i> Xem Bài Của Tôi
                        </a>

                        <a th:unless="${currentUser != null and currentUser.username == post.seller.username}"
                           th:href="@{'/posts/' + ${post.id}}"
                           class="btn btn-primary w-100 fw-bold shadow-sm">
                            <i class="bi bi-cart-check me-1"></i> Xem & Mua Ngay
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <nav th:if="${posts.totalPages > 1}" class="mt-5 mb-4">
            <ul class="pagination justify-content-center shadow-sm">

                <li class="page-item" th:classappend="${posts.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/(page=${posts.number - 1}, size=${size}, keyword=${keyword}, sort=${sort})}">
                        <i class="bi bi-chevron-left"></i> Trước
                    </a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                    th:classappend="${posts.number == i ? 'active' : ''}">
                    <a class="page-link" th:href="@{/(page=${i}, size=${size}, keyword=${keyword}, sort=${sort})}" th:text="${i + 1}">1</a>
                </li>

                <li class="page-item" th:classappend="${posts.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/(page=${posts.number + 1}, size=${size}, keyword=${keyword}, sort=${sort})}">
                        Sau <i class="bi bi-chevron-right"></i>
                    </a>
                </li>

            </ul>
        </nav>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
