<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - Hệ thống Escrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Escrow C2C</a>
        <div class="d-flex text-white align-items-center">
            <span class="me-3">
                Xin chào, <b th:text="${currentUser.username}">User</b>!
                | Ví: <strong class="text-warning" th:text="${#numbers.formatDecimal(currentUser.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
                <span th:if="${currentUser.holdBalance > 0}" class="text-danger">
                    (Đóng băng: <span th:text="${#numbers.formatDecimal(currentUser.holdBalance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</span>)
                </span>
            </span>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-12 text-center">
            <h2>Chào mừng bạn đến với Sàn Giao Dịch Escrow</h2>
            <p class="text-muted">Nơi giao dịch an toàn, bảo vệ quyền lợi bằng cơ chế tạm giữ tiền.</p>
            <hr>

            <div class="mt-4">
                <a href="/posts/create" class="btn btn-primary btn-lg me-2">Đăng Bán Sản Phẩm (-5,000đ)</a>
                <a href="/wallet/deposit" class="btn btn-success btn-lg">Nạp Tiền VNPay</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
