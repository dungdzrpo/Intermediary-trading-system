<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn Hàng Đã Bán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar('sales')}"></div>

    <div class="flex-grow-1 p-5">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-11">
                    <div class="card shadow border-0">
                        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
                            <h4 class="mb-0"><i class="bi bi-cash-stack me-2"></i>Đơn Hàng Đã Bán</h4>
                            <a href="/posts/create" class="btn btn-light btn-sm fw-bold text-primary shadow-sm">
                                <i class="bi bi-plus-circle me-1"></i>Đăng Bán Thêm
                            </a>
                        </div>

                        <div class="card-body p-4">
                            <div th:if="${#lists.isEmpty(orders)}"
                                 class="alert alert-info text-center d-flex flex-column align-items-center py-4">
                                <i class="bi bi-bag-x fs-1 text-secondary mb-2"></i>
                                <h5>Bạn chưa bán được đơn nào!</h5>
                                <p class="text-muted mb-0">Hãy đăng sản phẩm để bắt đầu giao dịch.</p>
                            </div>

                            <div class="table-responsive" th:unless="${#lists.isEmpty(orders)}">
                                <table class="table table-hover align-middle text-center mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th class="py-3">Mã Đơn</th>
                                        <th class="py-3 text-start">Sản Phẩm</th>
                                        <th class="py-3">Người Mua</th>
                                        <th class="py-3">Số Tiền</th>
                                        <th class="py-3">Trạng Thái</th>
                                    </tr>
                                    </thead>
                                    <tbody class="border-top-0">
                                    <tr th:each="o : ${orders}">
                                        <td class="fw-bold text-secondary" th:text="'#' + ${o.id}">#1</td>

                                        <td class="text-start fw-semibold" th:text="${o.post.title}">Tên sản phẩm</td>

                                        <td class="fw-bold text-primary" th:text="${o.buyer.username}">buyer01</td>

                                        <td class="fw-bold text-danger"
                                            th:text="${#numbers.formatDecimal(o.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                            100,000 đ
                                        </td>

                                        <td>
                                            <span th:if="${o.status.name() == 'ESCROWED'}"
                                                  class="badge bg-warning text-dark px-3 py-2">ĐANG TẠM GIỮ</span>
                                            <span th:if="${o.status.name() == 'COMPLETED'}"
                                                  class="badge bg-success px-3 py-2">HOÀN THÀNH</span>
                                            <span th:if="${o.status.name() == 'DISPUTED'}"
                                                  class="badge bg-danger px-3 py-2">KHIẾU NẠI</span>
                                            <span th:if="${o.status.name() == 'ADMIN_INTERVENTION'}"
                                                  class="badge bg-dark px-3 py-2">ADMIN XỬ LÝ</span>
                                            <span th:if="${o.status.name() == 'CANCELLED'}"
                                                  class="badge bg-secondary px-3 py-2">ĐÃ HỦY</span>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
