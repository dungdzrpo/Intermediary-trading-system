<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống Escrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4">Đăng Nhập</h3>
    <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
    <div th:if="${param.error}" class="alert alert-danger text-center">
        Tài khoản hoặc mật khẩu không chính xác!
    </div>
    <div th:if="${param.logout}" class="alert alert-success text-center">
        Bạn đã đăng xuất thành công!
    </div>

    <form th:action="@{/process-login}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
    </form>

    <div class="text-center mt-3">
        <span>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></span>
    </div>
</div>

</body>
</html>
