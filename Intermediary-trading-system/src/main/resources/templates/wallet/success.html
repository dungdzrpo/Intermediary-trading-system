<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Giao dịch thành công</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">

  <div th:replace="~{fragments/sidebar :: sidebar('deposit')}"></div>

  <div class="flex-grow-1 d-flex align-items-center justify-content-center p-5">

    <div class="card shadow-lg border-0 text-center" style="width: 450px; border-radius: 15px;">
      <div class="card-body p-5">
        <div class="mb-4">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
        </div>

        <h3 class="fw-bold text-dark mb-3">Thành Công!</h3>
        <h5 class="text-muted mb-4" th:text="${message}">Nạp tiền thành công!</h5>

        <hr class="mb-4">

        <a href="/" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">
          <i class="bi bi-house-door me-2"></i>Về Trang Chủ Kiểm Tra Ví
        </a>
        <a href="/wallet/history" class="btn btn-outline-secondary w-100 fw-bold mt-2">
          Xem Lịch Sử Giao Dịch
        </a>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
