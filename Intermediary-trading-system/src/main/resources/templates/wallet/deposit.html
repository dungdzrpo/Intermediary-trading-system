<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nạp Tiền VNPay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height: 100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar('deposit')}"></div>

    <div class="flex-grow-1 p-5">
        <div class="container-fluid">
            <div class="row justify-content-center mt-4">
                <div class="col-md-7 col-lg-5"> <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3 text-center">
                        <h4 class="mb-0"><i class="bi bi-wallet2 me-2"></i>Nạp Tiền Vào Ví</h4>
                    </div>
                    <div class="card-body p-4 p-md-5">

                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div th:text="${error}"></div>
                        </div>

                        <div class="text-center mb-4">
                            <img src="https://vnpay.vn/s1/vnpay/logo.png" alt="VNPay Logo" height="40">
                            <p class="text-muted mt-2 small">Cổng thanh toán an toàn & tiện lợi</p>
                        </div>

                        <form th:action="@{/wallet/deposit}" method="post">
                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark">Nhập số tiền cần nạp <span class="text-danger">*</span></label>
                                <div class="input-group input-group-lg shadow-sm">
                                    <input type="number" name="amount" class="form-control" min="10000" step="1000" placeholder="VD: 50000" required>
                                    <span class="input-group-text fw-bold bg-light">VNĐ</span>
                                </div>
                                <div class="form-text mt-2 text-muted">
                                    <i class="bi bi-info-circle me-1"></i> Số tiền nạp tối thiểu là 10.000 VNĐ.
                                </div>
                            </div>

                            <hr class="my-4 text-secondary">

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                                <i class="bi bi-shield-check me-2"></i>Thanh Toán Qua VNPay
                            </button>
                        </form>

                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
