<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar(activeTab)" class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark shadow" style="width: 270px; min-height: 100vh;">

    <style>
        .sidebar-item {
            transition: all 0.3s ease-in-out;
            border-left: 4px solid transparent;
            border-radius: 0 8px 8px 0;
            margin-bottom: 8px;
        }

        .sidebar-item:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
            font-weight: bold !important;
            border-left: 4px solid #ffc107 !important;
            transform: translateX(6px);
            color: #ffc107 !important;
        }

        .sidebar-item.active {
            border-left: 4px solid #fff !important;
            transform: translateX(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .user-dropdown {
            transition: all 0.2s ease;
        }
        .user-dropdown:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }
    </style>

    <a th:href="@{/}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
        <span class="fs-4 fw-bold text-warning" style="letter-spacing: 1px;">🛡️ Trading System</span>
    </a>

    <hr class="border-secondary">

    <div class="dropdown mb-4" th:if="${currentUser != null or #authorization.expression('isAuthenticated()')}">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle w-100 px-3 py-2 rounded user-dropdown" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle fs-3 me-2 text-info"></i>
            <span class="fs-5 fw-bold" th:text="${#authentication.name}">Username</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow w-100 border-0" aria-labelledby="dropdownUser">
            <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person-badge me-2"></i>Hồ sơ cá nhân</a></li>
            <li><hr class="dropdown-divider border-secondary"></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="dropdown-item text-danger fw-bold py-2"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button>
                </form>
            </li>
        </ul>
    </div>

    <ul class="nav nav-pills flex-column mb-auto">
        <li>
            <a th:href="@{/}" class="nav-link text-white sidebar-item px-3 py-2"
               th:classappend="${activeTab == 'home' ? 'active bg-primary fw-bold' : ''}">
                <span style="font-size: 1.05rem;">Chợ Giao Dịch</span>
            </a>
        </li>
        <li>
            <a th:href="@{/posts/create}" class="nav-link text-white sidebar-item px-3 py-2 mt-1"
               th:classappend="${activeTab == 'create' ? 'active bg-primary fw-bold' : ''}">
                <span style="font-size: 1.05rem;">Đăng Bán Sản Phẩm</span>
            </a>
        </li>
        <li>
            <a th:href="@{/wallet/deposit}" class="nav-link text-white sidebar-item px-3 py-2 mt-1"
               th:classappend="${activeTab == 'deposit' ? 'active bg-primary fw-bold' : ''}">
                <span style="font-size: 1.05rem;">Nạp Tiền (VNPay)</span>
            </a>
        </li>
        <li>
            <a th:href="@{/wallet/history}" class="nav-link text-white sidebar-item px-3 py-2 mt-1"
               th:classappend="${activeTab == 'history' ? 'active bg-primary fw-bold' : ''}">
                <span style="font-size: 1.05rem;">Lịch Sử Giao Dịch</span>
            </a>
        </li>
    </ul>

    <hr class="border-secondary mt-auto">
    <div class="text-center text-secondary small pb-2 fw-semibold">
        © 2026 Trading System
    </div>
</div>
</body>
</html>
