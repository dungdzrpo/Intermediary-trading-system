<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản Escrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 450px;">
    <h3 class="text-center mb-4">Đăng Ký Tài Khoản</h3>

    <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${userDTO}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" th:field="*{username}" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Email liên hệ</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" th:field="*{password}" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
            <label class="form-label">Xác nhận mật khẩu</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" required minlength="6">
        </div>

        <button type="submit" class="btn btn-success w-100 mt-2">Đăng Ký Ngay</button>
    </form>

    <div class="text-center mt-3">
        <span>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></span>
    </div>
</div>

</body>
</html>
